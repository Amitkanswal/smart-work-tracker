<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Smart Work Tracker">
  <defs>
    <linearGradient id="bg" x1="12%" y1="8%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="55%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Quarter-hour tick marks (hourly rhythm) -->
  <g opacity="0.4" fill="#ecfdf5">
    <rect x="62" y="20" width="4" height="10" rx="2"/>
    <rect x="62" y="98" width="4" height="10" rx="2"/>
    <rect x="20" y="62" width="10" height="4" rx="2"/>
    <rect x="98" y="62" width="10" height="4" rx="2"/>
  </g>
  <!-- Active segment arc -->
  <path
    d="M 64 28 A 36 36 0 0 1 100 64"
    fill="none"
    stroke="url(#accent)"
    stroke-width="6"
    stroke-linecap="round"
  />
  <circle cx="64" cy="64" r="34" fill="none" stroke="#f0fdfa" stroke-width="3.5"/>
  <circle cx="64" cy="64" r="4.5" fill="#f0fdfa"/>
  <g stroke="#f0fdfa" stroke-linecap="round">
    <line x1="64" y1="64" x2="64" y2="40" stroke-width="4.5"/>
    <line x1="64" y1="64" x2="84" y2="70" stroke-width="3.5"/>
  </g>
</svg>
